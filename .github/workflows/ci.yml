name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.slurm'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.slurm'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test-plots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      # Strongly recommended if you use matplotlib:
      - name: Force headless plotting backend
        run: |
          echo "MPLBACKEND=Agg" >> $GITHUB_ENV

      # Option A: run every script under a folder (e.g. plots/)
      - name: Run python scripts
        run: |
          uv run python --version

          cd time_step/analysis
          uv run KMF_survival.py
          uv run median.py

          cd ../../truncation
          uv run comparison.py
          uv run detachment_forces.py

          cd ../calibration
          uv run main.py
          uv run plot.py

          cd fix_delta
          uv run force_dist_P0_4.8.py
          uv run force_dist_P0_6.py

          cd ../match_fdetach
          uv run force_dist_P0_4.8.py
          uv run force_dist_P0_6.py 

      # Optionally: verify output files were created (edit paths as needed)
      # - name: Check plot outputs exist
      #   run: |
      #     test -f outputs/figure1.png
      #     test -f outputs/figure2.pdf
